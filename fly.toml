# fly.toml app configuration file generated for learner-backend on 2026-04-03T21:25:16+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'learner-backend'
primary_region = 'arn'

[build]
  dockerfile = 'Dockerfile.fly'

[[mounts]]
  source = 'dictionary_data'
  destination = '/data'

[http_service]
  internal_port = 3001
  force_https = true

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 50
    soft_limit = 25

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
